# Full-stack Smart Travel Planner.
# Bring up the whole stack:  docker compose up --build
# Postgres only (for local dev): docker compose up postgres

services:

  # ── Postgres + pgvector ────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: travel-planner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travel_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d travel_planner"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel-planner-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override DATABASE_URL to use the compose service name instead of localhost
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/travel_planner
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount the ml/ directory so trained models persist across rebuilds
      - ./backend/ml:/app/ml

  # ── React frontend (Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travel-planner-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: travel_planner_postgres_data
