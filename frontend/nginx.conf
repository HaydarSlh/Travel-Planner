server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* to the backend container.
    # Strip the /api prefix — FastAPI routes start at /, not /api/.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;

        # Disable buffering for SSE streaming — tokens must flow through immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
    }

    # React Router — any path not matching a real file falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Vite's fingerprinted assets for a year (immutable)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
